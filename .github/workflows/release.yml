name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json

      - name: Read tag message
        id: tag
        run: |
          {
            echo "notes<<TOASTMASTER_EOF"
            git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)'
            echo "TOASTMASTER_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" main.js manifest.json \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.tag.outputs.notes }}"
